colors: false
no_tty: true

pre-commit:
  parallel: true
  jobs:
    - name: protect-branch
      run: >
        d=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null|sed s,.*/,,)&&
        [ x${d} != x ]&&
        [ $(git symbolic-ref --short HEAD) = $d ]&&
        echo Direct commits to $d are not allowed. Use a feature branch.&&
        exit 1;true

    - name: ignored-files
      run: "! git check-ignore {staged_files}"

    - name: lefthook
      glob: lefthook.yml
      run: uv run lefthook validate

    - name: codecov
      glob: codecov.yml
      run: >
        curl -s --fail-with-body -X POST --data-binary
        @codecov.yml https://codecov.io/validate

    - name: tombi
      glob: '*.toml'
      run: |
        uv run tombi format {staged_files}
        uv run tombi lint {staged_files}
      stage_fixed: true

    - name: actionlint
      glob: '.github/workflows/*.{yml,yaml}'
      run: uv run actionlint {staged_files}

    - name: zizmor
      glob:
        - '.github/workflows/*.{yml,yaml}'
        - '.github/dependabot.yml'
      run: uv run zizmor {staged_files}

    - name: ruff
      glob: '*.{py,pyi}'
      run: |
        uv run ruff format {staged_files}
        uv run ruff check --fix {staged_files}
      stage_fixed: true

    - name: pyright
      glob: 'yt_dlp_plugins/**/*.py'
      run: uv run pyright {staged_files}

    - name: pytest
      glob: '**/*.py'
      run: uv run pytest -q

commit-msg:
  jobs:
    - name: commitizen
      run: uv run cz check --commit-msg-file {1}
    - name: no-scope
      run: >
        head -n1 {1} | grep -qE '^[a-z]+\(.*\):'&&
        echo Scope is not allowed. Use 'type: subject' format.&&
        exit 1;true

post-merge:
  jobs:
    - name: uv-sync
      run: uv sync

post-rewrite:
  jobs:
    - name: uv-sync
      run: 'if [ x{1} = xrebase ]; then uv sync; fi'
