version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      timezone: "Asia/Tokyo"
      interval: "weekly"
      day: "monday"
      time: "00:00"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      timezone: "Asia/Tokyo"
      interval: "weekly"
      day: "monday"
      time: "00:00"
    cooldown:
      default-days: 7
    groups:
      python-deps:
        patterns: ["*"]
