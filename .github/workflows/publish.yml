name: Publish to PyPI

permissions: {}

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]
    branches: [master]
    paths: [pyproject.toml]

jobs:
  ci:
    # branch pushではCIが別途走るためスキップし, tag push/手動実行時のみ呼び出す
    if: github.event_name != 'push' || github.ref_type == 'tag'
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write

  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      should-publish: ${{ steps.resolve.outputs.should-publish }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Resolve version
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          VERSION=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text())
          print(data['project']['version'])
          ")

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$REF_TYPE" = "tag" ]; then
            TAG_VERSION="${REF_NAME#v}"
            if [ "$TAG_VERSION" != "$VERSION" ]; then
              echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($VERSION)"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          else
            PREVIOUS=""
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              git fetch --depth=1 origin "$BEFORE_SHA" 2>/dev/null || true
              PREVIOUS=$(git show "$BEFORE_SHA":pyproject.toml | python3 -c "
          import tomllib, sys
          data = tomllib.loads(sys.stdin.read())
          print(data['project']['version'])
          " 2>/dev/null || echo "")
            fi

            if [ "$VERSION" != "$PREVIOUS" ] && [ -n "$VERSION" ]; then
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
              echo "should-publish=true" >> "$GITHUB_OUTPUT"
            else
              echo "should-publish=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  build:
    needs: [ci, resolve-version]
    if: >-
      !failure() && !cancelled()
      && needs.resolve-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7.3.1
        with:
          enable-cache: false

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/

  publish:
    needs: [resolve-version, build]
    if: >-
      !failure() && !cancelled()
      && needs.resolve-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/yt-dlp-AudioNormalize
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  github-release:
    needs: [resolve-version, build, publish]
    if: >-
      !failure() && !cancelled()
      && needs.resolve-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # git pushにGITHUB_TOKENが必要なためpersist-credentialsを維持する
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        # zizmor: ignore[artipacked]

      - name: Create tag if not exists
        env:
          TAG: v${{ needs.resolve-version.outputs.version }}
        run: |
          if [ -z "$(git ls-remote --tags origin "refs/tags/$TAG")" ]; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.resolve-version.outputs.version }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* --generate-notes
          fi
